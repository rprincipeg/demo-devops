name: CI-CD

on:
  push:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar pruebas
        run: pytest

      - name: Construir imagen Docker
        run: docker build -t demo-devops:${{ github.sha }} .

      - name: Levantar contenedor y verificar
        run: |
          docker run -d -p 5000:5000 --name demo demo-devops:${{ github.sha }}
          sleep 3
          curl -f http://localhost:5000/salud
